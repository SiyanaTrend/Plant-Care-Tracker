{% extends 'layouts/base.html' %}

{% block title %}Delete '{{ plant.plant_name }}'{% endblock %}

{% block content %}
    <div class='container'>
        <div class='card delete-card'>
            <div class='warning-icon'>
                <span class='icon'>🌺</span>
            </div>

            <h3>Delete '{{ plant.plant_name }}'?</h3>
            <p>Are you sure you want to remove this plant from your collection?</p>

            <form method='post' class='delete-actions'>
                {% csrf_token %}
                <div class='readonly-fields-container'>
                    {{ form }}
                </div>
                <div class='delete-actions vertical-buttons'>
                    <button type='submit' class='btn btn-delete'>Yes, delete!</button>
                    <a href='{% url "catalogue" %}' class='btn btn-secondary'>No, keep it!</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
